<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSS Login</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOP HEADER ================= -->
<header class="top-header">

  <!-- LEFT LOGOS -->
  <div class="logo-group left">
    <img src="images/clglogo.png" alt="College Logo">
    <img src="images/univesity11-removebg-preview.png" class="hide-mobile" alt="University Logo">
  </div>

  <!-- CENTER TEXT -->
  <div class="center-text">
    <p class="org">Rayat Shikshan Sanstha's</p>

    <h1>Karmaveer Bhaurao Patil College, Vashi</h1>

    <p class="sub">[ Empowered Autonomous ]</p>

    <h3>National Service Scheme</h3>
    <p class="unit">D-58</p>
    <p class="slogan">"Not Me But You"</p>
  </div>

  <!-- RIGHT LOGOS -->
  <div class="logo-group right">
    <img src="images/mybharatlogo_opt_2x.png" class="hide-mobile" alt="My Bharat Logo">
    <img src="images/founder.png" alt="Founder Logo">
  </div>

</header>

<div class="login-container">

  <h2>Volunteer Login</h2>

  <input type="text" id="studentId" placeholder="Enter Student ID">

  <input type="password" id="password" placeholder="Enter Password">

  <button class="btn" id="loginBtn">Login</button>

  <p id="error" style="color:red;"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
